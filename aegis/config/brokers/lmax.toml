# config/brokers/lmax.toml
[fix_session]
sender_comp_id = "RPD_TRADER_01"
target_comp_id = "LMAX"
fix_version = "FIX.4.4"
heartbeat_interval = 30

[connection]
host = "fix.lmax.com"
port = 443
use_ssl = true
tls_version = "1.3"
cert_file = "/opt/rpd/certs/lmax_client.crt"
key_file = "/opt/rpd/certs/lmax_client.key"

[performance]
socket_nodelay = true
tcp_quickack = true
recv_buffer = 4194304  # 4MB
send_buffer = 4194304
ring_buffer_size = 8192

[order_defaults]
time_in_force = "IOC"  # Immediate or Cancel
ord_type = "MARKET"    # Or LIMIT for copper
price_precision = 5    # 0.00001
quantity_precision = 2 # 0.01 lots

[symbols]
XCUUSD = "Copper"  # LMAX symbol mapping
