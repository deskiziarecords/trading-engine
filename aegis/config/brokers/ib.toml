# config/brokers/ib.toml
[fix_session]
sender_comp_id = "RPDIB01"
target_comp_id = "IB"
fix_version = "FIX.4.2"  # IB still on 4.2
heartbeat_interval = 60

[connection]
host = "fixgw.ibllc.com"
port = 4000
use_ssl = true
cert_file = "/opt/rpd/certs/ib_client.crt"

[performance]
socket_nodelay = true
recv_buffer = 2097152  # 2MB (IB smaller)
send_buffer = 2097152

[order_defaults]
time_in_force = "IOC"
ord_type = "MARKET"

[symbols]
XCUUSD = "CMDTY:COPPER"  # IB symbology
